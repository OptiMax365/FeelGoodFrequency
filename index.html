<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>104 Audio-Reactive Canvases</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --border:#1e1e2e;
  --accent:#7c5cfc;
  --text:#e0e0f0;
  --text2:#8888aa;
  --card-height:200px;
  --header-height:70px;
}
@media (max-width:768px){
  :root{
    --card-height:160px;
    --header-height:60px;
  }
}
@media (max-width:480px){
  :root{
    --card-height:140px;
  }
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  touch-action:manipulation;
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);
  padding:12px 16px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  height:var(--header-height);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
header h1{
  font-size:1.1rem;
  font-weight:600;
  background:linear-gradient(135deg,#7c5cfc,#00d4aa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  white-space:nowrap;
  margin:0;
}
.header-actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
#initBtn{
  padding:8px 16px;
  border:1px solid var(--accent);
  background:transparent;
  color:var(--accent);
  border-radius:8px;
  cursor:pointer;
  font-size:0.85rem;
  transition:all 0.25s ease;
  font-weight:500;
  min-width:120px;
}
#initBtn:hover{
  background:var(--accent);
  color:#fff;
  transform:scale(1.03);
}
#initBtn:active{
  transform:scale(0.98);
}
#initBtn.active{
  border-color:#00d4aa;
  color:#00d4aa;
  pointer-events:none;
  background:rgba(0,212,170,0.1);
}
#status{
  font-size:0.75rem;
  color:var(--text2);
  min-width:140px;
  text-align:right;
  line-height:1.3;
}
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:12px;
  padding:12px 16px 24px;
  width:100%;
  max-width:1800px;
  margin:0 auto;
}
@media (max-width:768px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:10px;
    padding:10px 12px 20px;
  }
}
@media (max-width:480px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:8px;
    padding:8px 10px 16px;
  }
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:transform 0.3s cubic-bezier(0.4,0,0.2,1),box-shadow 0.3s;
  position:relative;
  will-change:transform;
  aspect-ratio:16/10;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 30px rgba(124,92,252,0.15);
  z-index:5;
}
@media (hover:none){
  .card:hover{
    transform:none;
    box-shadow:none;
  }
}
.card canvas{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-label{
  position:absolute;
  top:8px;
  left:10px;
  font-size:0.55rem;
  color:var(--text2);
  background:rgba(10,10,15,0.85);
  padding:2px 8px;
  border-radius:6px;
  pointer-events:none;
  letter-spacing:0.3px;
  font-weight:500;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  max-width:85%;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
@media (max-width:480px){
  .card-label{
    font-size:0.5rem;
    padding:1px 6px;
    top:6px;
    left:8px;
  }
}
.hint{
  text-align:center;
  padding:12px 16px;
  color:var(--text2);
  font-size:0.8rem;
  font-style:italic;
  max-width:600px;
  margin:0 auto;
  line-height:1.4;
}
@media (max-width:480px){
  .hint{
    font-size:0.75rem;
    padding:8px 12px;
  }
}
footer{
  text-align:center;
  padding:20px 16px 40px;
  color:var(--text2);
  font-size:0.8rem;
}
@media (prefers-reduced-motion:reduce){
  *{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
    scroll-behavior:auto !important;
  }
}
</style>
</head>
<body>
<header>
  <h1>⬡ 104 Audio-Reactive Canvases</h1>
  <div class="header-actions">
    <button id="initBtn">🎙 Initialize Audio</button>
    <span id="status">Waiting…</span>
  </div>
</header>

<div id="grid"></div>

<div class="hint">
  Tap "Initialize Audio" to enable microphone input • 
  Animations respond to sound • 
  Works offline with organic fallback • 
  Scroll to explore all 104 unique visuals
</div>

<footer>
  <p>🎨 104 unique audio-reactive visualizations • Responsive design • Mobile optimized</p>
</footer>

<script>
(function(){
'use strict';

// Configuration
const TOTAL_VISUALS = 104;
const CATEGORY_COUNT = 13; // Increased from 12 to 13 for better distribution
const CATEGORY_NAMES = [
  'Ripples','Particles','Geometry','Waves','Cosmic','Bubble','Matrix',
  'Fractal','Plasma','Life','Fluid','Pulse','Nebula'
];
const CATEGORY_COLORS = [
  ['#4a9eff','#00d4aa','#7c5cfc','#ff6b9d','#ffd93d','#ff4757','#2ed573','#1e90ff','#ff6348'],
  ['#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff6b6b','#48dbfb','#ff9f43','#00d2d3'],
  ['#e056fd','#22a6b3','#7ed6df','#e77f67','#cf6a87','#574b90','#f8a5c2','#63cdda','#778beb'],
  ['#82ccdd','#e4c1f5','#f5cd79','#546de5','#e15f41','#3c6382','#d63031','#a29bfe','#fd79a8'],
  ['#b8e994','#6a89cc','#e55039','#82ccdd','#78e08f','#e66767','#3867d6','#f7b731','#fc5c65'],
  ['#0f9d58','#1db954','#34c759','#20bf6b','#00b894','#27ae60','#2ecc71','#26de81','#6ab04c'],
  ['#00b894','#00cec9','#0984e3','#6c5ce7','#e84393','#fd79a8','#d63031','#f39c12','#2ecc71'],
  ['#a29bfe','#6c5ce7','#fd79a8','#e17055','#00b894','#00cec9','#0984e3','#fdcb6e','#e84393'],
  ['#2d3436','#636e72','#b2bec3','#dfe6e9','#74b9ff','#a29bfe','#fd79a8','#55efc4','#ffeaa7'],
  ['#0984e3','#6c5ce7','#d63031','#fdcb6e','#00b894','#e84393','#00cec9','#fab1a0','#74b9ff'],
  ['#6c5ce7','#00cec9','#e17055','#a29bfe','#55efc4','#fd79a8','#ffeaa7','#74b9ff','#dfe6e9'],
  ['#fd79a8','#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#a29bfe','#00cec9'],
  ['#ff9e6d','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#feca57','#ff9ff3','#54a0ff','#5f27cd']
];

// DOM Elements
const grid = document.getElementById('grid');
const initBtn = document.getElementById('initBtn');
const statusEl = document.getElementById('status');

// Device & Display
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const baseCardWidth = isMobile ? 140 : 240;
const baseCardHeight = isMobile ? 140 : 200;

// Audio State
let audioCtx = null, analyser = null, src = null, active = false;
let vol = 0, bass = 0, mid = 0, treble = 0, beat = 0, beatDecay = 0;
let rawVol = 0, rawBass = 0, rawMid = 0, rawTreble = 0, rawBeat = 0;
let smoothVol = 0, smoothBass = 0, smoothMid = 0, smoothTreble = 0, smoothBeat = 0;
let fallback = false, fallbackT = 0;
let time = 0, frame = 0;

// Visualization Registry
const visuals = [];

// Utility Functions
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const lerpSmooth = (c, t, s) => lerp(c, t, s || 0.12);
const rand = (min, max) => Math.random() * (max - min) + min;
const randInt = (min, max) => Math.floor(rand(min, max + 1));

// Create all visualization cards
function createVisuals() {
  const visualsPerCategory = Math.floor(TOTAL_VISUALS / CATEGORY_COUNT);
  
  for (let i = 0; i < TOTAL_VISUALS; i++) {
    const catIdx = i % CATEGORY_COUNT;
    const subIdx = Math.floor(i / CATEGORY_COUNT);
    
    // Create card container
    const card = document.createElement('div');
    card.className = 'card';
    
    // Create label
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = `${CATEGORY_NAMES[catIdx]} #${subIdx + 1}`;
    
    // Create canvas
    const canvas = document.createElement('canvas');
    const cw = baseCardWidth * dpr;
    const ch = baseCardHeight * dpr;
    canvas.width = cw;
    canvas.height = ch;
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    
    // Assemble card
    card.appendChild(label);
    card.appendChild(canvas);
    grid.appendChild(card);
    
    // Get context and setup
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = false;
    
    const colors = CATEGORY_COLORS[catIdx];
    
    // Store visualization data
    visuals.push({
      ctx, canvas, catIdx, subIdx,
      phase: i * 0.37,
      freq: 0.5 + i * 0.07,
      colors,
      particles: [],
      lifeGrid: null,
      matrixCols: null,
      nebulaStars: null,
      error: false,
      lastRender: 0
    });
  }
}

// Initialize Audio Context
async function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.85;
    src.connect(analyser);
    active = true;
    initBtn.textContent = '🎙 Audio Active';
    initBtn.classList.add('active');
    statusEl.textContent = 'Mic: ' + stream.getAudioTracks()[0].label.slice(0, 20) + '…';
    fallback = false;
  } catch (e) {
    statusEl.textContent = 'Mic denied → Organic fallback active';
    fallback = true;
    console.log('Audio init failed, using fallback:', e.message);
  }
}

// Process Audio Input
function processAudio() {
  if (active && analyser) {
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);
    
    let sum = 0, bSum = 0, mSum = 0, tSum = 0;
    const bassEnd = Math.floor(bufLen * 0.06);
    const midEnd = Math.floor(bufLen * 0.25);
    
    for (let i = 0; i < bufLen; i++) {
      const v = data[i];
      sum += v;
      if (i < bassEnd) bSum += v;
      else if (i < midEnd) mSum += v;
      else tSum += v;
    }
    
    rawVol = sum / bufLen / 255;
    rawBass = bSum / bassEnd / 255;
    rawMid = mSum / (midEnd - bassEnd) / 255;
    rawTreble = tSum / (bufLen - midEnd) / 255;
    rawBeat = (rawVol > 0.55 && rawVol > smoothVol * 1.3) ? 1 : 0;
  }
  
  // Fallback organic simulation
  if (fallback) {
    fallbackT += 0.016;
    rawVol = 0.3 + Math.sin(fallbackT * 0.7) * 0.2 + Math.sin(fallbackT * 1.3) * 0.15;
    rawBass = 0.4 + Math.sin(fallbackT * 0.5) * 0.3;
    rawMid = 0.35 + Math.sin(fallbackT * 0.9) * 0.25;
    rawTreble = 0.3 + Math.sin(fallbackT * 1.4) * 0.2;
    rawBeat = Math.sin(fallbackT * 3.1) > 0.92 ? 1 : 0;
  }
  
  // Smooth values
  const s = 0.14;
  smoothVol = lerpSmooth(smoothVol, rawVol, s);
  smoothBass = lerpSmooth(smoothBass, rawBass, s);
  smoothMid = lerpSmooth(smoothMid, rawMid, s);
  smoothTreble = lerpSmooth(smoothTreble, rawTreble, s);
  smoothBeat = lerpSmooth(smoothBeat, rawBeat, s * 0.08);
  
  vol = smoothVol;
  bass = smoothBass;
  mid = smoothMid;
  treble = smoothTreble;
  beat = smoothBeat;
  
  // Beat decay
  beatDecay *= 0.94;
  if (beat > 0.3) beatDecay = 1;
}

// Main Render Function
function render(v) {
  const { ctx, catIdx, subIdx, phase, freq, colors } = v;
  const w = baseCardWidth, h = baseCardHeight;
  
  // Clear with fade effect
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, w, h);
  
  const t = time, p = phase, f = freq;
  const bv = vol, bb = bass, bm = mid, bt = treble, bbeat = beat, bdecay = beatDecay;
  
  try {
    switch (catIdx) {
      case 0: drawRipples(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 1: drawParticles(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 2: drawGeometry(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 3: drawWaves(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 4: drawCosmic(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 5: drawBubble(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 6: drawMatrix(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 7: drawFractal(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 8: drawPlasma(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 9: drawLife(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 10: drawFluid(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
      case 11: drawPulse(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx); break;
      case 12: drawNebula(ctx, w, h, t, p, f, bv, bb, bm, bt, bbeat, bdecay, colors, subIdx, v); break;
    }
  } catch (e) {
    if (!v.error) {
      v.error = true;
      ctx.fillStyle = '#ff4444';
      ctx.font = '12px sans-serif';
      ctx.fillText('ERR', 10, 15);
      console.error('Render error in visual', catIdx, e);
    }
  }
}

// ============ VISUALIZATION DRAWING FUNCTIONS ============

function drawRipples(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const cx = w/2, cy = h/2, n = 5 + idx % 4;
  for (let i = 0; i < n; i++) {
    const phase2 = i * Math.PI * 2 / n + p;
    const r = (15 + i * 20) * (0.5 + v * 0.8) + Math.sin(t * f + phase2) * 12 * (1 + b);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = colors[i % colors.length];
    ctx.globalAlpha = clamp(0.7 - i * 0.12, 0.05, 0.7);
    ctx.lineWidth = 1.2 + tr * 1.5;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawParticles(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  if (vis.particles.length < 15) {
    for (let i = 0; i < 25 + idx * 3; i++) {
      vis.particles.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 2.5,
        vy: (Math.random() - 0.5) * 2.5,
        sz: 1.5 + Math.random() * 2.5,
        hue: Math.random()
      });
    }
  }
  
  // Update and draw particles
  vis.particles.forEach(pt => {
    pt.x += pt.vx * (0.6 + v * 2.5) + Math.sin(t * f + pt.x * 0.02) * 0.6;
    pt.y += pt.vy * (0.6 + v * 2.5) + Math.cos(t * f + pt.y * 0.02) * 0.6;
    
    // Wrap around edges
    if (pt.x < -10) pt.x = w + 10;
    if (pt.x > w + 10) pt.x = -10;
    if (pt.y < -10) pt.y = h + 10;
    if (pt.y > h + 10) pt.y = -10;
  });
  
  // Draw connections
  ctx.globalAlpha = 0.3 + bd * 0.5;
  for (let i = 0; i < vis.particles.length; i++) {
    const p1 = vis.particles[i];
    for (let j = i + 1; j < vis.particles.length; j++) {
      const p2 = vis.particles[j];
      const dx = p1.x - p2.x, dy = p1.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < 50) {
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = colors[(i + idx) % colors.length];
        ctx.lineWidth = 0.4 + (1 - dist/50) * 0.8;
        ctx.globalAlpha = (0.2 + bd * 0.4) * (1 - dist/50);
        ctx.stroke();
      }
    }
  }
  
  // Draw particles
  ctx.globalAlpha = 0.8;
  vis.particles.forEach((pt, i) => {
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.sz * (0.6 + b * 0.7), 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length];
    ctx.fill();
  });
  
  ctx.globalAlpha = 1;
}

function drawGeometry(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const cx = w/2, cy = h/2;
  const sides = 3 + idx % 6;
  const rot = t * f * 0.6 + p;
  const baseSize = 25 + v * 40 + b * 25;
  
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);
  
  for (let layer = 0; layer < 3; layer++) {
    ctx.save();
    ctx.rotate(layer * Math.PI * 2 / 3);
    
    ctx.beginPath();
    for (let i = 0; i <= sides; i++) {
      const angle = i * Math.PI * 2 / sides;
      const size = baseSize + layer * 15 + Math.sin(t * 2 + layer) * 6 * (1 + m);
      const x = Math.cos(angle) * size;
      const y = Math.sin(angle) * size;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    
    ctx.strokeStyle = colors[(layer + idx) % colors.length];
    ctx.lineWidth = 1.3 + tr * 1.2;
    ctx.globalAlpha = 0.9 - layer * 0.2;
    ctx.stroke();
    
    ctx.fillStyle = colors[(layer + 2) % colors.length] + '25';
    ctx.fill();
    ctx.restore();
  }
  
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawWaves(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const waveCount = 3 + idx % 4;
  
  for (let i = 0; i < waveCount; i++) {
    ctx.beginPath();
    const yOffset = h * 0.3 + i * h * 0.15;
    
    for (let x = 0; x <= w; x += 3) {
      const freqMod = 0.025 + b * 0.01;
      const ampMod = 18 + v * 20 + m * 10;
      const y = yOffset + 
                Math.sin(x * freqMod + t * f * 1.2 + p + i) * ampMod +
                Math.cos(x * freqMod * 1.5 + t * f * 0.8 + i * 2) * (8 + tr * 5);
      
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    
    ctx.strokeStyle = colors[i % colors.length];
    ctx.lineWidth = 1.8 + tr * 1.5 + v * 1.2;
    ctx.globalAlpha = 0.75 - i * 0.15;
    ctx.stroke();
  }
  
  ctx.globalAlpha = 1;
}

function drawCosmic(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  // Initialize stars if needed
  if (!vis.nebulaStars) {
    vis.nebulaStars = [];
    const starCount = 40 + idx * 5;
    for (let i = 0; i < starCount; i++) {
      vis.nebulaStars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        size: Math.random() * 1.8 + 0.5,
        speed: Math.random() * 0.4 + 0.1,
        angle: Math.random() * Math.PI * 2,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }
  
  // Update and draw stars
  vis.nebulaStars.forEach(star => {
    star.angle += star.speed * 0.015 * (1 + b * 0.5);
    star.x += Math.cos(star.angle) * star.speed * (0.7 + v);
    star.y += Math.sin(star.angle) * star.speed * (0.7 + v);
    
    // Wrap around
    if (star.x < -5) star.x = w + 5;
    if (star.x > w + 5) star.x = -5;
    if (star.y < -5) star.y = h + 5;
    if (star.y > h + 5) star.y = -5;
    
    // Draw star
    const pulse = 0.6 + Math.sin(t * f * 4 + star.pulse) * 0.4;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size * (0.9 + bd * 0.4) * pulse, 0, Math.PI * 2);
    ctx.fillStyle = colors[Math.floor((star.x + star.y) * 0.1) % colors.length];
    ctx.globalAlpha = pulse * 0.85;
    ctx.fill();
  });
  
  // Draw central glow
  ctx.globalAlpha = 0.08 + bd * 0.12;
  ctx.beginPath();
  ctx.arc(w/2, h/2, 35 + v * 35 + b * 20, 0, Math.PI * 2);
  ctx.fillStyle = colors[idx % colors.length];
  ctx.fill();
  
  ctx.globalAlpha = 1;
}

function drawBubble(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  if (vis.particles.length < 12) {
    for (let i = 0; i < 60 + idx * 8; i++) {
      vis.particles.push({
        x: w/2 + (Math.random() - 0.5) * w * 0.7,
        y: h + 10,
        life: 1,
        speed: 0.8 + Math.random() * 2.5,
        drift: (Math.random() - 0.5) * 1.2,
        size: 2 + Math.random() * 4,
        hue: Math.random()
      });
    }
  }
  
  ctx.globalCompositeOperation = 'lighter';
  
  vis.particles.forEach(bub => {
    bub.y -= bub.speed * (0.7 + v * 1.8);
    bub.x += bub.drift + Math.sin(t * f + bub.y * 0.04) * 0.7;
    bub.life -= 0.007 * (1 + b * 0.4);
    
    // Reset if off screen or dead
    if (bub.life <= 0 || bub.y < -10) {
      bub.x = w/2 + (Math.random() - 0.5) * w * 0.7;
      bub.y = h + 5;
      bub.life = 1;
      bub.speed = 0.8 + Math.random() * 2.5;
    }
    
    // Draw bubble
    const gradient = ctx.createRadialGradient(bub.x, bub.y, 0, bub.x, bub.y, bub.size * bub.life * 2);
    gradient.addColorStop(0, colors[Math.floor(bub.hue * colors.length)] + 'cc');
    gradient.addColorStop(0.5, colors[Math.floor(bub.hue * colors.length)] + '66');
    gradient.addColorStop(1, 'transparent');
    
    ctx.beginPath();
    ctx.arc(bub.x, bub.y, bub.size * bub.life, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.globalAlpha = bub.life * 0.8;
    ctx.fill();
  });
  
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

function drawMatrix(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  const charSize = 11;
  const cols = Math.floor(w / charSize);
  
  // Initialize columns if needed
  if (!vis.matrixCols) {
    vis.matrixCols = [];
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヰヱヲン0123456789';
    
    for (let i = 0; i < cols; i++) {
      vis.matrixCols.push({
        y: Math.random() * h,
        speed: 1.2 + Math.random() * 2.8,
        chars: []
      });
      
      // Generate random characters for this column
      const charCount = 8 + Math.floor(Math.random() * 12);
      for (let j = 0; j < charCount; j++) {
        vis.matrixCols[i].chars.push(chars.charAt(randInt(0, chars.length - 1)));
      }
    }
  }
  
  // Fade effect
  ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
  ctx.fillRect(0, 0, w, h);
  
  ctx.font = `${charSize}px monospace`;
  ctx.textAlign = 'center';
  
  vis.matrixCols.forEach((col, colIdx) => {
    col.y += col.speed * (0.6 + v * 2.2);
    
    // Reset column if off screen
    if (col.y > h + 20) {
      col.y = -20;
      col.speed = 1.2 + Math.random() * 2.8;
      // Occasionally change characters
      if (Math.random() > 0.7) {
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノ0123456789';
        col.chars = col.chars.map(() => chars.charAt(randInt(0, chars.length - 1)));
      }
    }
    
    // Draw characters in column
    col.chars.forEach((char, charIdx) => {
      const y = col.y - charIdx * charSize;
      if (y < -charSize || y > h + charSize) return;
      
      // Head character is brighter
      const isHead = charIdx === 0;
      const alpha = isHead ? 0.95 : clamp(0.7 - charIdx * 0.06, 0.1, 0.7);
      
      ctx.fillStyle = colors[(colIdx + charIdx + idx) % colors.length];
      ctx.globalAlpha = alpha * (isHead ? 1 : 0.8 + bd * 0.2);
      
      if (isHead) {
        ctx.fillStyle = '#ffffff';
        ctx.globalAlpha = 0.95;
      }
      
      ctx.fillText(char, colIdx * charSize + charSize/2, y);
    });
  });
  
  ctx.globalAlpha = 1;
}

function drawFractal(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const maxDepth = 5 + idx % 3;
  const baseLen = 35 + v * 35;
  
  function branch(x, y, angle, length, depth) {
    if (depth > maxDepth || length < 2.5) return;
    
    const x2 = x + Math.cos(angle) * length;
    const y2 = y + Math.sin(angle) * length;
    
    // Draw branch
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = colors[(depth + idx) % colors.length];
    ctx.globalAlpha = 1 - depth / maxDepth * 0.65;
    ctx.lineWidth = clamp(maxDepth - depth + 0.5, 0.6, 3.5) * (1 + tr * 0.4);
    ctx.stroke();
    
    // Recurse with audio modulation
    const spread = 0.35 + b * 0.25 + Math.sin(t * 1.8 + depth) * 0.08;
    const lenMod = 0.72 * (1 + m * 0.15);
    
    branch(x2, y2, angle - spread, length * lenMod, depth + 1);
    branch(x2, y2, angle + spread, length * lenMod, depth + 1);
  }
  
  // Start from bottom center with slight sway
  const sway = Math.sin(t * 0.4) * 0.08;
  branch(w/2, h - 8, -Math.PI/2 + sway, baseLen, 0);
  
  ctx.globalAlpha = 1;
}

function drawPlasma(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const step = 7 + Math.floor(idx / 4) * 2;
  
  for (let x = 0; x < w; x += step) {
    for (let y = 0; y < h; y += step) {
      // Multi-layered sine wave plasma
      const val = (
        Math.sin(x * 0.04 + t * f * 0.9 + p) +
        Math.sin(y * 0.04 + t * f * 0.7 + p + 1) +
        Math.sin((x + y) * 0.03 + t * f * 1.3 + p + 2) +
        Math.sin(Math.sqrt(x*x + y*y) * 0.025 + t * f * 0.5 + p + 3)
      ) / 4;
      
      // Map value to color
      const colorIdx = clamp(Math.floor((val + 1) * colors.length / 2), 0, colors.length - 1);
      ctx.fillStyle = colors[colorIdx];
      ctx.globalAlpha = 0.25 + val * 0.35 + v * 0.25 + bd * 0.1;
      ctx.fillRect(x, y, step + 1, step + 1);
    }
  }
  
  ctx.globalAlpha = 1;
}

function drawLife(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  const cellSize = 7 + idx % 4;
  const cols = Math.floor(w / cellSize);
  const rows = Math.floor(h / cellSize);
  
  // Initialize grid if needed
  if (!vis.lifeGrid) {
    vis.lifeGrid = [];
    for (let y = 0; y < rows; y++) {
      vis.lifeGrid[y] = [];
      for (let x = 0; x < cols; x++) {
        vis.lifeGrid[y][x] = Math.random() > 0.72 ? 1 : 0;
      }
    }
  }
  
  // Update grid at variable speed based on audio
  const updateInterval = 10 - Math.floor(b * 5);
  if (frame % clamp(updateInterval, 3, 12) === 0) {
    const next = [];
    for (let y = 0; y < rows; y++) {
      next[y] = [];
      for (let x = 0; x < cols; x++) {
        // Count neighbors with wrapping
        let neighbors = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nx = (x + dx + cols) % cols;
            const ny = (y + dy + rows) % rows;
            neighbors += vis.lifeGrid[ny][nx];
          }
        }
        
        // Game of Life rules with audio influence
        const alive = vis.lifeGrid[y][x];
        const birthChance = 0.15 + v * 0.2;
        next[y][x] = (alive && (neighbors === 2 || neighbors === 3)) || 
                     (!alive && (neighbors === 3 || (Math.random() < birthChance && neighbors === 2 && v > 0.4))) ? 1 : 0;
      }
    }
    vis.lifeGrid = next;
  }
  
  // Draw cells
  vis.lifeGrid.forEach((row, y) => {
    row.forEach((cell, x) => {
      if (cell || v > 0.35) {
        const colorIdx = (x + y + idx + Math.floor(t * 2)) % colors.length;
        ctx.fillStyle = colors[colorIdx];
        ctx.globalAlpha = cell ? 0.75 : 0.18 + v * 0.3;
        
        // Beat flash effect
        if (cell && Math.random() < bd * 0.25) {
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = 0.9;
        }
        
        ctx.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
      }
    });
  });
  
  ctx.globalAlpha = 1;
}

function drawFluid(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  const streamCount = 4 + idx % 5;
  
  // Draw flowing streams
  for (let s = 0; s < streamCount; s++) {
    ctx.beginPath();
    let x = 0;
    let y = h * (0.15 + s / streamCount * 0.7);
    ctx.moveTo(x, y);
    
    for (let i = 0; i < 80; i++) {
      const nx = x + 4;
      // Complex wave motion with audio modulation
      const wave1 = Math.sin(nx * 0.035 + t * f + p + s) * 18 * (1 + b);
      const wave2 = Math.cos(nx * 0.06 + t * f * 0.9 + s * 2) * 12 * m;
      const wave3 = Math.sin(nx * 0.02 + t * f * 1.4 + s) * 8 * tr;
      const ny = y + wave1 + wave2 + wave3;
      
      ctx.lineTo(nx, ny);
      x = nx;
      y = ny;
    }
    
    ctx.strokeStyle = colors[s % colors.length];
    ctx.lineWidth = 1.6 + tr * 1.8 + v * 1.5;
    ctx.globalAlpha = 0.55 + bd * 0.35;
    ctx.stroke();
  }
  
  // Draw floating particles
  for (let i = 0; i < 25 + idx * 2; i++) {
    const px = (i * 23 + Math.sin(t * f + i) * w * 0.3) % w;
    const py = (i * 31 + Math.cos(t * f * 0.8 + i) * h * 0.4) % h;
    
    ctx.beginPath();
    ctx.arc(px, py, 1.8 + v * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = colors[i % colors.length];
    ctx.globalAlpha = 0.65 + Math.sin(t * 3 + i) * 0.2;
    ctx.fill();
  }
  
  ctx.globalAlpha = 1;
}

function drawPulse(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx) {
  const cx = w/2, cy = h/2;
  const ringCount = 4 + idx % 5;
  
  // Draw concentric rings
  for (let i = 0; i < ringCount; i++) {
    const phase2 = i * Math.PI * 2 / ringCount + p;
    const pulse = Math.sin(t * f * 2.2 + phase2) * 0.5 + 0.5;
    const radius = 18 + pulse * 55 * (1 + v) + i * 14 + bt * 35;
    
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = colors[i % colors.length];
    ctx.lineWidth = 1.8 + tr * 2.5 + pulse * 1.5;
    ctx.globalAlpha = 0.35 + pulse * 0.45 + bd * 0.25;
    ctx.stroke();
  }
  
  // Central glow
  const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 45 + v * 45);
  gradient.addColorStop(0, colors[idx % colors.length] + 'aa');
  gradient.addColorStop(0.6, colors[idx % colors.length] + '44');
  gradient.addColorStop(1, 'transparent');
  
  ctx.fillStyle = gradient;
  ctx.globalAlpha = 0.5 + bd * 0.4;
  ctx.fillRect(0, 0, w, h);
  
  ctx.globalAlpha = 1;
}

function drawNebula(ctx, w, h, t, p, f, v, b, m, tr, bt, bd, colors, idx, vis) {
  // Initialize nebula clouds if needed
  if (!vis.nebulaStars) {
    vis.nebulaStars = [];
    // Create cloud centers
    for (let i = 0; i < 3 + idx % 3; i++) {
      vis.nebulaStars.push({
        x: rand(0, w),
        y: rand(0, h),
        radius: rand(30, 70),
        speed: rand(0.003, 0.01),
        color: colors[randInt(0, colors.length - 1)],
        particles: []
      });
      
      // Add particles to this cloud
      for (let j = 0; j < 40; j++) {
        vis.nebulaStars[i].particles.push({
          angle: rand(0, Math.PI * 2),
          dist: rand(0, 1),
          size: rand(0.5, 2.5),
          speed: rand(0.01, 0.03)
        });
      }
    }
  }
  
  // Draw nebula clouds
  vis.nebulaStars.forEach(cloud => {
    // Update cloud position slowly
    cloud.x += Math.sin(t * cloud.speed) * 0.3;
    cloud.y += Math.cos(t * cloud.speed * 0.7) * 0.3;
    
    // Draw cloud particles
    cloud.particles.forEach(pt => {
      pt.angle += pt.speed * (1 + b * 0.5);
      const px = cloud.x + Math.cos(pt.angle) * cloud.radius * pt.dist * (0.8 + v * 0.4);
      const py = cloud.y + Math.sin(pt.angle) * cloud.radius * pt.dist * (0.8 + v * 0.4);
      
      // Pulsing size and opacity
      const pulse = 0.6 + Math.sin(t * 2 + pt.angle * 3) * 0.4;
      const alpha = 0.15 + pulse * 0.35 * (1 - pt.dist * 0.7);
      
      ctx.beginPath();
      ctx.arc(px, py, pt.size * (1 + bd * 0.5) * pulse, 0, Math.PI * 2);
      ctx.fillStyle = cloud.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
    });
    
    // Draw central glow
    const gradient = ctx.createRadialGradient(
      cloud.x, cloud.y, 0,
      cloud.x, cloud.y, cloud.radius * 0.7
    );
    gradient.addColorStop(0, cloud.color + '44');
    gradient.addColorStop(0.7, cloud.color + '11');
    gradient.addColorStop(1, 'transparent');
    
    ctx.fillStyle = gradient;
    ctx.globalAlpha = 0.3 + bd * 0.2;
    ctx.beginPath();
    ctx.arc(cloud.x, cloud.y, cloud.radius * 0.8, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Draw foreground stars
  for (let i = 0; i < 30; i++) {
    const sx = (i * 37 + t * 15) % w;
    const sy = (i * 41) % h;
    const twinkle = 0.4 + Math.sin(t * 5 + i) * 0.6;
    
    ctx.beginPath();
    ctx.arc(sx, sy, 0.8 + twinkle * 0.7, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.7 + twinkle * 0.3;
    ctx.fill();
  }
  
  ctx.globalAlpha = 1;
}

// Animation Loop
function animate() {
  time += 0.016;
  frame++;
  
  processAudio();
  
  // Render all visuals with performance consideration
  for (let i = 0; i < visuals.length; i++) {
    // Skip rendering if off-screen (basic optimization)
    if (!visuals[i].error) {
      render(visuals[i]);
    }
  }
  
  requestAnimationFrame(animate);
}

// Initialize
function init() {
  // Create all visualization cards
  createVisuals();
  
  // Setup audio button
  initBtn.addEventListener('click', initAudio);
  
  // Auto fallback after delay
  setTimeout(() => {
    if (!active && !fallback) {
      statusEl.textContent = 'Auto: Organic simulation active';
      fallback = true;
    }
  }, 3000);
  
  // Handle visibility change to pause audio context
  document.addEventListener('visibilitychange', () => {
    if (document.hidden && audioCtx && audioCtx.state !== 'suspended') {
      audioCtx.suspend();
    } else if (!document.hidden && audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
  });
  
  // Start animation loop
  animate();
  
  // Initial status
  statusEl.textContent = 'Tap to initialize audio (3s auto-fallback)';
}

// Start when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
})();
</script>
