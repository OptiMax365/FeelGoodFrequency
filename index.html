
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>104 Audio-Reactive Canvases</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--accent:#7c5cfc;--text:#e0e0f0;--text2:#8888aa}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,var(--bg) 60%,transparent);padding:16px 24px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px}
header h1{font-size:1.2rem;font-weight:600;background:linear-gradient(135deg,#7c5cfc,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#initBtn{padding:10px 24px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .25s}
#initBtn:hover{background:var(--accent);color:#fff;transform:scale(1.05)}
#initBtn.active{border-color:#00d4aa;color:#00d4aa;pointer-events:none}
#status{font-size:.75rem;color:var(--text2);min-width:180px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;padding:16px 24px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s;position:relative}
.card:hover{transform:translateY(-4px) scale(1.015);box-shadow:0 12px 40px rgba(124,92,252,.12)}
.card canvas{display:block;width:100%;height:200px}
.card-label{position:absolute;top:8px;left:10px;font-size:.6rem;color:var(--text2);background:rgba(10,10,15,.7);padding:2px 6px;border-radius:4px;pointer-events:none;letter-spacing:.5px}
/* View Mode Styles */
#viewModeBtn{padding:10px 24px;border:1px solid #00d4aa;background:transparent;color:#00d4aa;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .25s;margin-left:8px}
#viewModeBtn:hover{background:#00d4aa;color:#0a0a0f;transform:scale(1.05)}
.view-mode-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(10,10,15,0.95);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.view-mode-container{background:var(--card);border:2px solid var(--accent);border-radius:16px;max-width:95vw;max-height:95vh;display:flex;flex-direction:column;overflow:hidden}
.view-mode-header{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(18,18,26,0.95)}
.view-mode-header h2{font-size:1.1rem;font-weight:600;color:var(--text)}
#closeViewMode{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:1rem;transition:all .2s}
#closeViewMode:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.view-mode-controls{display:flex;flex-wrap:wrap;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(18,18,26,0.9);align-items:center}
.control-group{display:flex;align-items:center;gap:8px;font-size:.85rem}
.control-group label{color:var(--text2)}
.res-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}
.res-btn.active{border-color:var(--accent);background:rgba(124,92,252,0.15);color:var(--accent)}
.res-btn:hover{border-color:var(--accent);transform:scale(1.03)}
#visualSelect{padding:6px 10px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:6px;font-size:.85rem}
#recordDuration{width:60px;padding:4px 8px;border:1px solid var(--border);background:var(--bg);color:var(--text);border-radius:4px;text-align:center}
#startRecordBtn{padding:8px 16px;border:1px solid #00d4aa;background:transparent;color:#00d4aa;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s;font-weight:500}
#startRecordBtn:hover{background:#00d4aa;color:#0a0a0f;transform:scale(1.03)}
#startRecordBtn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.view-mode-canvas-container{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;min-height:300px}
#viewCanvas{display:block;max-width:100%;max-height:100%;object-fit:contain}
#textLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.text-element{position:absolute;pointer-events:auto;cursor:move;min-width:50px;min-height:20px;padding:4px 8px;border:2px dashed transparent;border-radius:4px;transition:border-color .2s;user-select:none}
.text-element:hover{border-color:var(--accent)}
.text-element.editing{border-color:#00d4aa;background:rgba(0,212,170,0.1)}
.text-element[contenteditable="true"]{cursor:text;outline:none}
.text-resize-handle{position:absolute;width:12px;height:12px;background:var(--accent);border:2px solid #fff;border-radius:50%;pointer-events:auto;cursor:nwse-resize}
.text-resize-handle.br{bottom:-6px;right:-6px}
.text-resize-handle.bl{bottom:-6px;left:-6px;cursor:nesw-resize}
.text-resize-handle.tr{top:-6px;right:-6px;cursor:nesw-resize}
.text-resize-handle.tl{top:-6px;left:-6px}
.text-tools{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;border-top:1px solid var(--border);background:rgba(18,18,26,0.95);font-size:.8rem}
#addTextBtn{padding:6px 14px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}
#addTextBtn:hover{background:var(--accent);color:#fff}
#textColorPicker{width:36px;height:28px;padding:0;border:2px solid var(--border);background:var(--bg);border-radius:6px;cursor:pointer}
#textColorPicker:hover{border-color:var(--accent)}
.hint{color:var(--text2);font-style:italic}
#recordingIndicator{display:none;align-items:center;gap:8px;padding:8px 16px;background:rgba(255,71,87,0.15);border:1px solid #ff4757;border-radius:8px;color:#ff6b6b;font-size:.85rem;font-weight:500}
#recordingIndicator.active{display:flex;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.download-progress{width:100px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-left:12px}
.download-progress-bar{height:100%;background:linear-gradient(90deg,#7c5cfc,#00d4aa);width:0%;transition:width .3s}
.text-color-bar{display:flex;gap:4px;align-items:center}
.color-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:all .2s}
.color-swatch:hover{border-color:#fff;transform:scale(1.1)}
.color-swatch.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent)}
</style>
</head>
<body>
<header>
<h1>⬡ 104 Audio-Reactive Canvases</h1>
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<button id="initBtn">🎙 Initialize Audio</button>
<button id="viewModeBtn">🎬 View Mode</button>
<span id="status">Waiting…</span>
</div>
</header>
<div id="grid"></div>

<!-- View Mode Overlay -->
<div id="viewModeOverlay" class="view-mode-overlay" style="display:none;">
  <div class="view-mode-container">
    <div class="view-mode-header">
      <h2>🎬 Full Screen Preview</h2>
      <button id="closeViewMode">✕ Close</button>
    </div>
    <div class="view-mode-controls">
      <div class="control-group">
        <label>Resolution:</label>
        <button class="res-btn active" data-w="1080" data-h="1920">📱 1080×1920</button>
        <button class="res-btn" data-w="1920" data-h="1080">🖥️ 1920×1080</button>
      </div>
      <div class="control-group">
        <label>Visual:</label>
        <select id="visualSelect"></select>
      </div>
      <div class="control-group">
        <label>Duration:</label>
        <input type="number" id="recordDuration" min="5" max="60" value="15"> sec
      </div>
      <button id="startRecordBtn">⏺️ Record & Download</button>
      <div id="recordingIndicator">
        <span>● Recording</span>
        <div class="download-progress"><div class="download-progress-bar" id="progressBar"></div></div>
      </div>
    </div>
    <div class="view-mode-canvas-container" id="canvasContainer">
      <canvas id="viewCanvas"></canvas>
      <div id="textLayer"></div>
    </div>
    <div class="text-tools">
      <button id="addTextBtn">➕ Add Text</button>
      <div class="text-color-bar">
        <label style="color:var(--text2);font-size:.8rem">Color:</label>
        <input type="color" id="textColorPicker" value="#ffffff">
        <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff"></div>
        <div class="color-swatch" data-color="#00d4aa" style="background:#00d4aa"></div>
        <div class="color-swatch" data-color="#7c5cfc" style="background:#7c5cfc"></div>
        <div class="color-swatch" data-color="#ff6b9d" style="background:#ff6b9d"></div>
        <div class="color-swatch" data-color="#ffd93d" style="background:#ffd93d"></div>
        <div class="color-swatch" data-color="#ff4757" style="background:#ff4757"></div>
      </div>
      <span class="hint">Double-click text to edit • Drag to move • Corners to resize</span>
    </div>
  </div>
</div>

<script>
(function(){
'use strict';
const COLS=104,CAT_COUNT=12;
const CAT_NAMES=['Ripples','Particles','Geometry','Waves','Cosmic','Bubble','Matrix','Fractal','Plasma','Life','Fluid','Pulse'];
const CAT_COLORS=[
['#4a9eff','#00d4aa','#7c5cfc','#ff6b9d','#ffd93d','#ff4757','#2ed573','#1e90ff','#ff6348'],
['#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff6b6b','#48dbfb','#ff9f43','#00d2d3'],
['#e056fd','#22a6b3','#7ed6df','#e77f67','#cf6a87','#574b90','#f8a5c2','#63cdda','#778beb'],
['#82ccdd','#e4c1f5','#f5cd79','#546de5','#e15f41','#3c6382','#d63031','#a29bfe','#fd79a8'],
['#b8e994','#6a89cc','#e55039','#82ccdd','#78e08f','#e66767','#3867d6','#f7b731','#fc5c65'],
['#0f9d58','#1db954','#34c759','#20bf6b','#00b894','#27ae60','#2ecc71','#26de81','#6ab04c'],
['#00b894','#00cec9','#0984e3','#6c5ce7','#e84393','#fd79a8','#d63031','#f39c12','#2ecc71'],
['#a29bfe','#6c5ce7','#fd79a8','#e17055','#00b894','#00cec9','#0984e3','#fdcb6e','#e84393'],
['#2d3436','#636e72','#b2bec3','#dfe6e9','#74b9ff','#a29bfe','#fd79a8','#55efc4','#ffeaa7'],
['#0984e3','#6c5ce7','#d63031','#fdcb6e','#00b894','#e84393','#00cec9','#fab1a0','#74b9ff'],
['#6c5ce7','#00cec9','#e17055','#a29bfe','#55efc4','#fd79a8','#ffeaa7','#74b9ff','#dfe6e9'],
['#fd79a8','#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#a29bfe','#00cec9']
];

const grid=document.getElementById('grid');
const btn=document.getElementById('initBtn');
const status=document.getElementById('status');
const dpr=Math.min(window.devicePixelRatio||1,2);
const CW=280,CH=200;

// Audio state
let audioCtx=null,analyser=null,src=null,active=false;
let vol=0,bass=0,mid=0,treble=0,beat=0,beatDecay=0;
let rawVol=0,rawBass=0,rawMid=0,rawTreble=0,rawBeat=0;
let smoothVol=0,smoothBass=0,smoothMid=0,smoothTreble=0,smoothBeat=0;
let fallback=false,fallbackT=0;
let time=0,frame=0;

// Lerp helper
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const lerpSmooth=(c,t,s)=>lerp(c,t,s||.12);

// Canvas data
const canvases=[];
const errs=new Set();

function createCanvases(){
const perCat=Math.floor(104/CAT_COUNT); // 8
const extra=104-perCat*CAT_COUNT; // 8 extra distributed to first 8 cats
for(let i=0;i<104;i++){
let catIdx;
if(i<perCat*(CAT_COUNT+1)) catIdx=Math.floor(i/(perCat+1));
else catIdx=Math.ceil((i-perCat*(CAT_COUNT+1))/(perCat))+extra;
// simpler distribution
catIdx=i%CAT_COUNT;
let subIdx=0;
for(let j=0;j<=i;j++){if(j%CAT_COUNT===catIdx)subIdx++}
subIdx--;

const card=document.createElement('div');
card.className='card';
const label=document.createElement('div');
label.className='card-label';
label.textContent=CAT_NAMES[catIdx]+' #'+(subIdx+1);
const canvas=document.createElement('canvas');
canvas.width=CW*dpr;
canvas.height=CH*dpr;
canvas.style.width=CW+'px';
canvas.style.height=CH+'px';
card.appendChild(label);
card.appendChild(canvas);
grid.appendChild(card);

const ctx=canvas.getContext('2d');
ctx.scale(dpr,dpr);
ctx.imageSmoothingEnabled=false;

const colors=CAT_COLORS[catIdx];
canvases.push({
ctx,canvas,catIdx,subIdx,
phase:i*0.37,
freq:0.5+i*0.07,
colors,
particles:[],
lifeGrid:null,
matrixCols:null,
error:false
});
}
}

// Audio setup
async function initAudio(){
try{
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
const stream=await navigator.mediaDevices.getUserMedia({audio:true});
src=audioCtx.createMediaStreamSource(stream);
analyser=audioCtx.createAnalyser();
analyser.fftSize=2048;
analyser.smoothingTimeConstant=0.8;
src.connect(analyser);
active=true;
btn.textContent='🎙 Audio Active';
btn.classList.add('active');
status.textContent='Mic: '+stream.getAudioTracks()[0].label;
fallback=false;
}catch(e){
status.textContent='Mic denied → Organic fallback';
fallback=true;
}
}

function processAudio(){
if(active&&analyser){
const bufLen=analyser.frequencyBinCount;
const data=new Uint8Array(bufLen);
analyser.getByteFrequencyData(data);

let sum=0,bSum=0,mSum=0,tSum=0;
const bassEnd=Math.floor(bufLen*0.06);
const midEnd=Math.floor(bufLen*0.25);
for(let i=0;i<bufLen;i++){
const v=data[i];
sum+=v;
if(i<bassEnd)bSum+=v;
else if(i<midEnd)mSum+=v;
else tSum+=v;
}
rawVol=sum/bufLen/255;
rawBass=bSum/bassEnd/255;
rawMid=mSum/(midEnd-bassEnd)/255;
rawTreble=tSum/(bufLen-midEnd)/255;
rawBeat=rawVol>0.55&&rawVol>smoothVol*1.3?1:0;
}
if(fallback){
fallbackT+=0.016;
rawVol=0.3+Math.sin(fallbackT*0.7)*0.2+Math.sin(fallbackT*1.3)*0.15+Math.sin(fallbackT*2.7)*0.1;
rawBass=0.4+Math.sin(fallbackT*0.5)*0.3+Math.sin(fallbackT*1.1)*0.2;
rawMid=0.35+Math.sin(fallbackT*0.9)*0.25+Math.sin(fallbackT*1.7)*0.15;
rawTreble=0.3+Math.sin(fallbackT*1.4)*0.2+Math.sin(fallbackT*2.3)*0.1;
rawBeat=Math.sin(fallbackT*3.1)>0.92?1:0;
}
const s=0.14;
smoothVol=lerpSmooth(smoothVol,rawVol,s);
smoothBass=lerpSmooth(smoothBass,rawBass,s);
smoothMid=lerpSmooth(smoothMid,rawMid,s);
smoothTreble=lerpSmooth(smoothTreble,rawTreble,s);
smoothBeat=lerpSmooth(smoothBeat,rawBeat,s*.08);
vol=smoothVol;bass=smoothBass;mid=smoothMid;treble=smoothTreble;beat=smoothBeat;
beatDecay=beatDecay*0.94;
if(beat>0.3)beatDecay=1;
}

// ============ RENDERERS ============
function hexToRgb(hex){
const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
return{r,g,b};
}

function render(c){
const{ctx,catIdx,subIdx,phase,freq,colors}=c;
const w=CW,h=CH;
ctx.clearRect(0,0,w,h);
// background
ctx.fillStyle='rgba(10,10,15,0.15)';
ctx.fillRect(0,0,w,h);

const t=time;
const p=phase;
const f=freq;
const v=vol;
const b=bass;
const m=mid;
const tr=treble;
const bt=beat;
const bd=beatDecay;

try{
switch(catIdx){
case 0: drawRipples(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
case 1: drawParticles(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 2: drawGeometry(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
case 3: drawWaves(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
case 4: drawCosmic(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 5: drawBubble(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 6: drawMatrix(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 7: drawFractal(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
case 8: drawPlasma(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
case 9: drawLife(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 10: drawFluid(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx,c);break;
case 11: drawPulse(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,subIdx);break;
}
}catch(e){
if(!c.error){c.error=true;ctx.fillStyle='#ff4444';ctx.font='12px sans-serif';ctx.fillText('ERR',10,15)}
}
}

// --- 0: Ripples ---
function drawRipples(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const cx=w/2,cy=h/2;
const n=5+idx;
for(let i=0;i<n;i++){
const phase2=i*Math.PI*2/n+p;
const r=(20+i*25)*(0.5+v*0.8)+Math.sin(t*f+phase2)*15*(1+b);
const alpha=clamp(0.6-i*0.08,0.05,0.6);
ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.strokeStyle=colors[i%colors.length];
ctx.globalAlpha=alpha;
ctx.lineWidth=1.5+tr*2;
ctx.stroke();
}
ctx.globalAlpha=1;
}

// --- 1: Particles ---
function drawParticles(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
if(!c.particles.length||c.particles.length<10){
for(let i=0;i<30+idx*5;i++){
c.particles.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,sz:2+Math.random()*3});
}
}
c.particles.forEach(p=>{
p.x+=p.vx*(0.5+v*2)+Math.sin(t*f+p.x*0.01)*0.5;
p.y+=p.vy*(0.5+v*2)+Math.cos(t*f+p.y*0.01)*0.5;
if(p.x<0)p.x=w;if(p.x>w)p.x=0;
if(p.y<0)p.y=h;if(p.y>h)p.y=0;
});
ctx.globalAlpha=0.4+bd*0.6;
c.particles.forEach((p,i)=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.sz*(0.5+b*0.8),0,Math.PI*2);
ctx.fillStyle=colors[i%colors.length];
ctx.fill();
});
ctx.globalAlpha=0.15;
c.particles.forEach((p,i)=>{
c.particles.slice(i+1).forEach(q=>{
const dx=p.x-q.x,dy=p.y-q.y;
const d=Math.sqrt(dx*dx+dy*dy);
if(d<60){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(q.x,q.y);
ctx.strokeStyle=colors[(i+idx)%colors.length];
ctx.lineWidth=0.5;
ctx.stroke();
}
});
});
ctx.globalAlpha=1;
}

// --- 2: Geometry ---
function drawGeometry(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const cx=w/2,cy=h/2;
const sides=3+idx%7;
const rot=t*f*0.5+p;
const sz=30+v*50+b*30;
ctx.save();
ctx.translate(cx,cy);
ctx.rotate(rot);
for(let i=0;i<3+idx%3;i++){
ctx.save();
ctx.rotate(i*Math.PI*2/(3+idx%3));
ctx.beginPath();
for(let j=0;j<=sides;j++){
const a=j*Math.PI*2/sides;
const r=sz+i*12+Math.sin(t*2+i)*5*(1+m);
ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
}
ctx.closePath();
ctx.strokeStyle=colors[(i+idx)%colors.length];
ctx.lineWidth=1.5+tr;
ctx.stroke();
ctx.fillStyle=colors[(i+2)%colors.length]+'22';
ctx.fill();
ctx.restore();
}
ctx.restore();
}

// --- 3: Waves ---
function drawWaves(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const n=3+idx%4;
for(let i=0;i<n;i++){
ctx.beginPath();
for(let x=0;x<=w;x+=2){
const y=h/2+Math.sin(x*0.03*(1+b)+t*f+p+i)*25*(1+v)+Math.cos(x*0.05+t*f*1.5+i*2)*15*m;
x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
}
ctx.strokeStyle=colors[i%colors.length];
ctx.lineWidth=2+tr*2;
ctx.globalAlpha=0.6-i*0.1;
ctx.stroke();
}
ctx.globalAlpha=1;
}

// --- 4: Cosmic ---
function drawCosmic(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
if(!c.particles.length||c.particles.length<20){
for(let i=0;i<60+idx*10;i++){
c.particles.push({x:Math.random()*w,y:Math.random()*h,sz:Math.random()*2.5,spd:Math.random()*0.5+0.1,angle:Math.random()*Math.PI*2});
}
}
c.particles.forEach(p=>{
p.angle+=p.spd*0.01*(1+b);
p.x+=Math.cos(p.angle)*p.spd*(0.5+v);
p.y+=Math.sin(p.angle)*p.spd*(0.5+v);
if(p.x<0)p.x=w;if(p.x>w)p.x=0;
if(p.y<0)p.y=h;if(p.y>h)p.y=0;
});
c.particles.forEach(p=>{
const twinkle=0.5+Math.sin(t*f*3+p.x+p.y)*0.5;
ctx.beginPath();
ctx.arc(p.x,p.y,p.sz*(0.8+bd*0.5),0,Math.PI*2);
ctx.fillStyle=colors[Math.floor(p.x+p.y)%colors.length];
ctx.globalAlpha=twinkle*0.8;
ctx.fill();
});
ctx.globalAlpha=0.05+bd*0.15;
ctx.beginPath();
ctx.arc(w/2,h/2,40+v*40,0,Math.PI*2);
ctx.fillStyle=colors[idx%colors.length];
ctx.fill();
ctx.globalAlpha=1;
}

// --- 5: Bubble ---
function drawBubble(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
if(!c.particles.length||c.particles.length<10){
for(let i=0;i<80+idx*10;i++){
c.particles.push({x:w/2+(Math.random()-0.5)*60,y:h-10,life:1,speed:1+Math.random()*3,drift:(Math.random()-0.5)*1.5,sz:2+Math.random()*4});
}
}
ctx.globalCompositeOperation='lighter';
c.particles.forEach(p=>{
p.y-=p.speed*(0.5+v*2);
p.x+=p.drift+Math.sin(t*f+p.y*0.05)*0.5;
p.life-=0.008*(1+b*0.5);
if(p.life<=0||p.y<0){
p.x=w/2+(Math.random()-0.5)*60;
p.y=h-5;
p.life=1;
}
const ci=clamp(Math.floor((1-p.life)*3)%colors.length,0,colors.length-1);
ctx.beginPath();
ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);
ctx.fillStyle=colors[ci];
ctx.globalAlpha=p.life*0.7;
ctx.fill();
});
ctx.globalCompositeOperation='source-over';
ctx.globalAlpha=1;
}

// --- 6: Matrix ---
function drawMatrix(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
if(!c.matrixCols){
const cols=Math.floor(w/14);
c.matrixCols=[];
for(let i=0;i<cols;i++){
c.matrixCols.push({y:Math.random()*h,speed:1+Math.random()*3,chars:[]});
const n=5+Math.floor(Math.random()*15);
for(let j=0;j<n;j++)c.matrixCols[i].chars.push(String.fromCharCode(33+Math.floor(Math.random()*94)));
}
}
ctx.fillStyle='rgba(10,10,15,0.12)';
ctx.fillRect(0,0,w,h);
ctx.font='11px monospace';
c.matrixCols.forEach((col,i)=>{
col.y+=col.speed*(0.5+v*2);
if(col.y>h){col.y=-20;col.speed=1+Math.random()*3;}
col.chars.forEach((ch,j)=>{
const cy=col.y-j*14;
if(cy<0||cy>h)return;
const bright=1-j*0.08;
ctx.fillStyle=colors[(i+j+idx)%colors.length];
ctx.globalAlpha=clamp(bright*0.8,0.05,0.8);
if(j===0){ctx.fillStyle='#fff';ctx.globalAlpha=0.9;}
ctx.fillText(ch,i*14,cy);
});
});
ctx.globalAlpha=1;
}

// --- 7: Fractal ---
function drawFractal(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const maxDepth=6+idx%4;
const len=40+v*30;
const angle=t*f*0.3+p;
function branch(x,y,a,l,d){
if(d>maxDepth||l<3)return;
const x2=x+Math.cos(a)*l;
const y2=y+Math.sin(a)*l;
ctx.beginPath();
ctx.moveTo(x,y);
ctx.lineTo(x2,y2);
ctx.strokeStyle=colors[(d+idx)%colors.length];
ctx.globalAlpha=1-d/maxDepth*0.7;
ctx.lineWidth=clamp(maxDepth-d,0.5,4)*(1+tr*0.5);
ctx.stroke();
const spread=0.4+b*0.3+Math.sin(t*2+d)*0.1;
branch(x2,y2,a-spread,l*0.68*(1+m*0.2),d+1);
branch(x2,y2,a+spread,l*0.68*(1+m*0.2),d+1);
}
branch(w/2,h-10,-Math.PI/2+Math.sin(t*0.5)*0.1,len,0);
ctx.globalAlpha=1;
}

// --- 8: Plasma ---
function drawPlasma(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const step=6+Math.floor(idx/3)*2;
for(let x=0;x<w;x+=step){
for(let y=0;y<h;y+=step){
const v1=Math.sin(x*0.05+t*f+p);
const v2=Math.sin(y*0.05+t*f*0.7+p+1);
const v3=Math.sin((x+y)*0.03+t*f*1.3+p+2);
const v4=Math.sin(Math.sqrt(x*x+y*y)*0.02+t*f*0.5+p+3);
const val=(v1+v2+v3+v4)/4;
const ci=clamp(Math.floor((val+1)*colors.length/2),0,colors.length-1);
ctx.fillStyle=colors[ci];
ctx.globalAlpha=0.3+val*0.3+v*0.2;
ctx.fillRect(x,y,step,step);
}
}
ctx.globalAlpha=1;
}

// --- 9: Life (Cellular Automaton) ---
function drawLife(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
const cellSz=8+idx%4;
const cols=Math.floor(w/cellSz);
const rows=Math.floor(h/cellSz);
if(!c.lifeGrid){
c.lifeGrid=[];
for(let y=0;y<rows;y++){
c.lifeGrid[y]=[];
for(let x=0;x<cols;x++){
c.lifeGrid[y][x]=Math.random()>0.7?1:0;
}
}
}
if(frame%(8+Math.floor(idx/3))===0){
const next=[];
for(let y=0;y<rows;y++){
next[y]=[];
for(let x=0;x<cols;x++){
let n=0;
for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
if(!dx&&!dy)continue;
const ny=(y+dy+rows)%rows,nx=(x+dx+cols)%cols;
n+=c.lifeGrid[ny][nx];
}
const alive=c.lifeGrid[y][x];
next[y][x]=(alive&&(n===2||n===3))||(!alive&&n===3)?1:0;
}
}
c.lifeGrid=next;
}
const inject=v>0.4;
c.lifeGrid.forEach((row,y)=>{
row.forEach((cell,x)=>{
if(cell||inject){
ctx.fillStyle=colors[(x+y+idx)%colors.length];
ctx.globalAlpha=cell?0.7:0.15;
if(cell&&Math.random()<bd*0.3){ctx.fillStyle='#fff';ctx.globalAlpha=0.9;}
ctx.fillRect(x*cellSz,y*cellSz,cellSz-1,cellSz-1);
}
});
});
ctx.globalAlpha=1;
}

// --- 10: Fluid ---
function drawFluid(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,c){
const streams=4+idx%5;
for(let s=0;s<streams;s++){
ctx.beginPath();
const startY=h*(0.1+s/(streams));
let x=0,y=startY;
ctx.moveTo(x,y);
for(let i=0;i<100;i++){
const nx=x+3;
const ny=y+Math.sin(nx*0.03+t*f+p+s)*15*(1+b)+Math.cos(nx*0.05+t*f*0.8+s*2)*10*m;
ctx.lineTo(nx,ny);
x=nx;y=ny;
}
ctx.strokeStyle=colors[s%colors.length];
ctx.lineWidth=1.5+tr*2+v*2;
ctx.globalAlpha=0.5+bd*0.3;
ctx.stroke();
}
// overlay dots
for(let i=0;i<20+idx*3;i++){
const dx=(i*17+Math.sin(t*f+i)*50)%w;
const dy=(i*23+Math.cos(t*f*0.7+i)*40)%h;
ctx.beginPath();
ctx.arc(dx,dy,1.5+v*3,0,Math.PI*2);
ctx.fillStyle=colors[i%colors.length];
ctx.globalAlpha=0.6;
ctx.fill();
}
ctx.globalAlpha=1;
}

// --- 11: Pulse ---
function drawPulse(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
const cx=w/2,cy=h/2;
const rings=4+idx%5;
for(let i=0;i<rings;i++){
const phase2=i*Math.PI*2/rings+p;
const pulse=Math.sin(t*f*2+phase2)*0.5+0.5;
const r=20+pulse*60*(1+v)+i*15+bt*40;
ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.strokeStyle=colors[i%colors.length];
ctx.lineWidth=2+tr*3+pulse*2;
ctx.globalAlpha=0.3+pulse*0.5+bd*0.3;
ctx.stroke();
}
// center glow
const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,40+v*50);
grd.addColorStop(0,colors[idx%colors.length]+'88');
grd.addColorStop(1,'transparent');
ctx.fillStyle=grd;
ctx.globalAlpha=0.5+bd*0.5;
ctx.fillRect(0,0,w,h);
ctx.globalAlpha=1;
}

// ============ VIEW MODE SYSTEM ============
let viewModeActive=false;
let viewCanvas,viewCtx,textLayer,canvasContainer;
let currentResolution={w:1080,h:1920};
let selectedVisualIdx=0;
let textElements=[];
let selectedTextObj=null;
let recording=false;
let mediaRecorder=null;
let recordedChunks=[];
let recordingStartTime=0;

// View Mode DOM elements
const viewModeOverlay=document.getElementById('viewModeOverlay');
const viewModeBtn=document.getElementById('viewModeBtn');
const closeViewModeBtn=document.getElementById('closeViewMode');
const resButtons=document.querySelectorAll('.res-btn');
const visualSelect=document.getElementById('visualSelect');
const recordDurationInput=document.getElementById('recordDuration');
const startRecordBtn=document.getElementById('startRecordBtn');
const addTextBtn=document.getElementById('addTextBtn');
const textLayerEl=document.getElementById('textLayer');

// Initialize visual selector
function initVisualSelect(){
visualSelect.innerHTML='';
CAT_NAMES.forEach((name,idx)=>{
const opt=document.createElement('option');
opt.value=idx;
opt.textContent=name;
visualSelect.appendChild(opt);
});
visualSelect.addEventListener('change',(e)=>{
selectedVisualIdx=parseInt(e.target.value);
});
}

// Open view mode
function openViewMode(){
viewModeActive=true;
viewModeOverlay.style.display='flex';
document.body.style.overflow='hidden';

// Setup view canvas
viewCanvas=document.getElementById('viewCanvas');
viewCtx=viewCanvas.getContext('2d');
textLayer=document.getElementById('textLayer');
canvasContainer=document.getElementById('canvasContainer');

// Set initial resolution
applyResolution(currentResolution.w,currentResolution.h);

// Populate visual selector if empty
if(visualSelect.options.length===0)initVisualSelect();

// Event listeners for resolution buttons
resButtons.forEach(btn=>{
btn.addEventListener('click',()=>{

});
});

// Text tools

// Color picker

if(selectedTextObj){
selectedTextObj.color=e.target.value;

updateColorSwatches(e.target.value);
}
});

// Color swatches
colorSwatches.forEach(swatch=>{
swatch.addEventListener('click',()=>{
const color=swatch.dataset.color;

}

});
});

// Close handler

}

function closeViewMode(){
viewModeActive=false;
viewModeOverlay.style.display='none';
document.body.style.overflow='';
if(recording)stopRecording();
// Clear text elements on close
textElements.forEach(te=>{
if(te.element&&te.element.parentNode)te.element.parentNode.removeChild(te.element);
});
textElements=[];
selectedTextObj=null;
}

function applyResolution(w,h){
viewCanvas.width=w;
viewCanvas.height=h;
// Calculate display size maintaining aspect ratio
const containerW=canvasContainer.clientWidth;
const containerH=canvasContainer.clientHeight;
const scale=Math.min(containerW/w,containerH/h,1);
viewCanvas.style.width=(w*scale)+'px';
viewCanvas.style.height=(h*scale)+'px';
textLayer.style.width=w+'px';
textLayer.style.height=h+'px';
// Clear text elements when resolution changes
textElements.forEach(te=>{
if(te.element&&te.element.parentNode)te.element.parentNode.removeChild(te.element);
});
textElements=[];
selectedTextObj=null;
}

function updateColorSwatches(activeColor){
colorSwatches.forEach(s=>{
s.classList.toggle('active',s.dataset.color.toLowerCase()===activeColor.toLowerCase());
});
}


// Text element system
function addTextElement(){
// Only create ONE text element - prevent duplicates
const id='text_'+Date.now();

const textEl=document.createElement('div');
textEl.className='text-element';
textEl.id=id;
textEl.contentEditable='true';
textEl.textContent='Your Text Here';
textEl.style.fontSize='24px';
textEl.style.color='#ffffff';
textEl.style.fontFamily='Segoe UI, system-ui, sans-serif';
textEl.style.fontWeight='600';
textEl.style.textShadow='0 2px 10px rgba(0,0,0,0.5)';
textEl.style.zIndex='10';
textEl.style.whiteSpace='nowrap';

// Resize handles
['br','bl','tr','tl'].forEach(pos=>{
const handle=document.createElement('div');
handle.className='text-resize-handle '+pos;
handle.dataset.handle=pos;
textEl.appendChild(handle);
});

textLayer.appendChild(textEl);

// Calculate centered position in canvas coordinates
const estimatedWidth=200;
const estimatedHeight=40;
const centerX=(currentResolution.w-estimatedWidth)/2;
const centerY=(currentResolution.h-estimatedHeight)/2;

const textObj={
id,element:textEl,
x:centerX,y:centerY,width:estimatedWidth,height:estimatedHeight,fontSize:24,
color:'#ffffff',fontFamily:'Segoe UI, system-ui, sans-serif',fontWeight:'600',
isDragging:false,isResizing:false,startX:0,startY:0,startLeft:0,startTop:0,startWidth:0,startHeight:0,resizeHandle:null
};
textElements.push(textObj);
updateTextElementPosition(textObj);

// Mouse events for drag - only on the element itself, not children
textEl.addEventListener('mousedown',(e)=>{
// Ignore if clicking on resize handle or input area
if(e.target.classList.contains('text-resize-handle'))return;
if(e.target.isContentEditable&&textEl.contains(document.activeElement))return;

// Deselect other text elements
textElements.forEach(t=>{if(t.element!==textEl)t.element.classList.remove('editing');});
textEl.classList.add('editing');
selectedTextObj=textObj;

textObj.isDragging=true;
textObj.startX=e.clientX;
textObj.startY=e.clientY;
textObj.startLeft=textObj.x;
textObj.startTop=textObj.y;
e.preventDefault();
e.stopPropagation();
});

// Resize handles
textEl.querySelectorAll('.text-resize-handle').forEach(handle=>{
handle.addEventListener('mousedown',(e)=>{
textObj.isResizing=true;
textObj.resizeHandle=handle.dataset.handle;
textObj.startX=e.clientX;
textObj.startY=e.clientY;
textObj.startWidth=textObj.width;
textObj.startHeight=textObj.height;
e.stopPropagation();
e.preventDefault();
});
});

// Global mouse move/up - use canvas coordinates
document.addEventListener('mousemove',onTextMouseMove);
document.addEventListener('mouseup',onTextMouseUp);

// Double-click to edit
textEl.addEventListener('dblclick',(e)=>{
e.preventDefault();
textEl.focus();
const range=document.createRange();
range.selectNodeContents(textEl);
const sel=window.getSelection();
sel.removeAllRanges();
sel.addRange(range);
});

// Update styles when content changes
textEl.addEventListener('input',()=>{
const rect=textEl.getBoundingClientRect();
// Convert display rect to canvas coordinates
const containerRect=canvasContainer.getBoundingClientRect();
const scale=currentResolution.w/parseFloat(viewCanvas.style.width)||1;
textObj.width=(rect.width-containerRect.left)*scale;
textObj.height=(rect.height-containerRect.top)*scale;
});

// Focus/blur for editing state
textEl.addEventListener('focus',()=>{
textEl.classList.add('editing');
selectedTextObj=textObj;
updateColorSwatches(textObj.color);
textColorPicker.value=textObj.color;
});
textEl.addEventListener('blur',()=>{
textEl.classList.remove('editing');
if(!textEl.textContent.trim())textEl.textContent='Your Text Here';
});

// Select this text element
selectedTextObj=textObj;
updateColorSwatches('#ffffff');
textColorPicker.value='#ffffff';
}

function onTextMouseMove(e){
if(!viewModeActive)return;
const containerRect=canvasContainer.getBoundingClientRect();
const scale=currentResolution.w/parseFloat(viewCanvas.style.width)||1;

textElements.forEach(obj=>{
if(obj.isDragging){
const dx=(e.clientX-containerRect.left-obj.startX)*scale;
const dy=(e.clientY-containerRect.top-obj.startY)*scale;
const newLeft=clamp(obj.startLeft+dx,0,currentResolution.w-50);
const newTop=clamp(obj.startTop+dy,0,currentResolution.h-20);
obj.x=newLeft;
obj.y=newTop;
updateTextElementPosition(obj);
}else if(obj.isResizing&&obj.resizeHandle){
const dx=(e.clientX-containerRect.left-obj.startX)*scale;
const dy=(e.clientY-containerRect.top-obj.startY)*scale;
let newW=obj.startWidth,newH=obj.startHeight;

if(obj.resizeHandle.includes('r'))newW+=dx;
if(obj.resizeHandle.includes('l')){newW-=dx;obj.x=clamp(obj.x-dx,0,currentResolution.w-50);}
if(obj.resizeHandle.includes('b'))newH+=dy;
if(obj.resizeHandle.includes('t')){newH-=dy;obj.y=clamp(obj.y-dy,0,currentResolution.h-20);}

newW=clamp(newW,50,800);
newH=clamp(newH,20,200);
obj.width=newW;
obj.height=newH;

// Adjust font size proportionally
const newFontSize=clamp(12+newH*0.3,12,72);
obj.fontSize=newFontSize;
updateTextElementPosition(obj);
}
});
}

function onTextMouseUp(){
textElements.forEach(obj=>{
obj.isDragging=false;
obj.isResizing=false;
obj.resizeHandle=null;
});
}

function updateTextElementPosition(obj){
obj.element.style.left=obj.x+'px';
obj.element.style.top=obj.y+'px';
obj.element.style.width=obj.width+'px';
obj.element.style.height=obj.height+'px';
obj.element.style.fontSize=obj.fontSize+'px';
obj.element.style.color=obj.color;
obj.element.style.fontFamily=obj.fontFamily;
obj.element.style.fontWeight=obj.fontWeight;
}

// Render to view canvas
function renderViewCanvas(){
if(!viewModeActive||!viewCtx)return;
const{w,h}=currentResolution;
const t=time;
const p=frame*0.01;
const f=0.8;
const v=vol,b=bass,m=mid,tr=treble,bt=beat,bd=beatDecay;
const colors=CAT_COLORS[selectedVisualIdx];

// Clear with fade for trail effect
viewCtx.fillStyle='rgba(10,10,15,0.12)';
viewCtx.fillRect(0,0,w,h);

// Call appropriate renderer with view canvas dimensions
try{
switch(selectedVisualIdx){
case 0: drawRipples(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
case 1: drawParticles(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{particles:[]});break;
case 2: drawGeometry(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
case 3: drawWaves(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
case 4: drawCosmic(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{particles:[]});break;
case 5: drawBubble(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{particles:[]});break;
case 6: drawMatrix(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{matrixCols:null});break;
case 7: drawFractal(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
case 8: drawPlasma(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
case 9: drawLife(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{lifeGrid:null});break;
case 10: drawFluid(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0,{particles:[]});break;
case 11: drawPulse(viewCtx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,0);break;
}
}catch(e){
console.log('View render error:',e);
}

// Render text elements on canvas (for recording)
textElements.forEach(obj=>{
if(obj.element&&obj.element.textContent){
viewCtx.save();
viewCtx.font=`${obj.fontWeight} ${obj.fontSize}px ${obj.fontFamily}`;
viewCtx.fillStyle=obj.color;
viewCtx.textAlign='left';
viewCtx.textBaseline='top';
// Shadow for readability
viewCtx.shadowColor='rgba(0,0,0,0.7)';
viewCtx.shadowBlur=8;
viewCtx.shadowOffsetX=2;
viewCtx.shadowOffsetY=2;
// Word wrap for long text
const text=obj.element.textContent;
const maxWidth=obj.width-16;
const lineHeight=obj.fontSize*1.3;
let y=obj.y;
let x=obj.x;
const words=text.split(' ');
let line='';
for(let n=0;n<words.length;n++){
const testLine=line+words[n]+' ';
const metrics=viewCtx.measureText(testLine);
if(metrics.width>maxWidth&&n>0){
viewCtx.fillText(line,x,y);
line=words[n]+' ';
y+=lineHeight;
}else{
line=testLine;
}
}
viewCtx.fillText(line,x,y);
viewCtx.restore();
}
});
}

// Recording system
async function toggleRecording(){
if(recording){
stopRecording();
return;
}
const durationSec=parseInt(recordDurationInput.value)||15;
recordingDuration=clamp(durationSec,5,60)*1000;

try{
const stream=viewCanvas.captureStream(30);
// Try to add audio if available
if(audioCtx&&analyser){
const audioDest=audioCtx.createMediaStreamDestination();
if(src)src.connect(audioDest);
const audioTrack=audioDest.stream.getAudioTracks()[0];
if(audioTrack)stream.addTrack(audioTrack);
}

mediaRecorder=new MediaRecorder(stream,{
mimeType:MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':
MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm'
});

recordedChunks=[];
mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
mediaRecorder.onstop=saveRecording;

mediaRecorder.start(100);
recording=true;
recordingStartTime=Date.now();
startRecordBtn.textContent='⏹️ Stop & Download';
startRecordBtn.disabled=true;
recordingIndicator.classList.add('active');
recordingIndicator.style.display='flex';

// Update progress
const progressInterval=setInterval(()=>{
const elapsed=Date.now()-recordingStartTime;
const pct=Math.min(100,(elapsed/recordingDuration)*100);
progressBar.style.width=pct+'%';
if(elapsed>=recordingDuration)stopRecording();
},100);

// Store interval ID on button for cleanup
startRecordBtn._progressInterval=progressInterval;

}catch(e){
console.error('Recording error:',e);
status.textContent='Recording failed: '+e.message;
startRecordBtn.disabled=false;
}
}

function stopRecording(){
if(!recording||!mediaRecorder)return;
recording=false;
if(startRecordBtn._progressInterval){
clearInterval(startRecordBtn._progressInterval);
delete startRecordBtn._progressInterval;
}
mediaRecorder.stop();
startRecordBtn.textContent='⏺️ Record & Download';
startRecordBtn.disabled=false;
recordingIndicator.classList.remove('active');
progressBar.style.width='0%';
}

function saveRecording(){
if(recordedChunks.length===0){
status.textContent='No data recorded';
return;
}
const blob=new Blob(recordedChunks,{type:mediaRecorder.mimeType});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
const resLabel=currentResolution.w===1080?'portrait':'landscape';
a.download=`audio-reactive-${CAT_NAMES[selectedVisualIdx].toLowerCase()}-${resLabel}-${new Date().toISOString().slice(0,10)}.webm`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
status.textContent='✓ Video downloaded!';
recordedChunks=[];
}

// ============ MAIN LOOP ============
function loop(){
time+=0.016;
frame++;
processAudio();
for(let i=0;i<canvases.length;i++){
if(!canvases[i].error)render(canvases[i]);
}
// Render view canvas if active
if(viewModeActive)renderViewCanvas();
requestAnimationFrame(loop);
}

// ============ INIT ============
btn.addEventListener('click',initAudio);
viewModeBtn.addEventListener('click',openViewMode);
createCanvases();
status.textContent='Click to initialize audio (3s auto-fallback)';
setTimeout(()=>{
if(!active){
status.textContent='Auto: Organic simulation active';
fallback=true;
}
},3000);
loop();
})();
</script>
</body>
