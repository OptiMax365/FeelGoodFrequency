<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>104 Animated Canvases</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --card:#12121a;
  --border:#1e1e2e;
  --accent:#7c5cfc;
  --text:#e0e0f0;
  --text2:#8888aa;
  --card-aspect:1.4;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  touch-action:pan-y;
  overflow-x:hidden;
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(180deg,var(--bg) 75%,transparent);
  padding:10px 16px;
  display:flex;
  align-items:center;
  justify-content:center;
  height:56px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
header h1{
  font-size:1rem;
  font-weight:600;
  background:linear-gradient(135deg,#7c5cfc,#00d4aa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:0;
  text-align:center;
}
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  padding:10px 12px 24px;
  width:100%;
  max-width:1600px;
  margin:0 auto;
  will-change:transform;
  contain:layout style;
}
@media (min-width:768px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:12px;
    padding:12px 16px 32px;
  }
}
@media (min-width:1024px){
  #grid{
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:14px;
    padding:14px 20px 40px;
  }
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  position:relative;
  aspect-ratio:var(--card-aspect);
  contain:content;
  transform:translateZ(0);
  will-change:transform;
}
.card canvas{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-label{
  position:absolute;
  top:6px;
  left:8px;
  font-size:0.5rem;
  color:var(--text2);
  background:rgba(10,10,15,0.9);
  padding:2px 7px;
  border-radius:5px;
  pointer-events:none;
  letter-spacing:0.2px;
  font-weight:500;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:80%;
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
}
.hint{
  text-align:center;
  padding:10px 16px 20px;
  color:var(--text2);
  font-size:0.75rem;
  max-width:500px;
  margin:0 auto;
  line-height:1.4;
}
footer{
  text-align:center;
  padding:16px;
  color:var(--text2);
  font-size:0.75rem;
  border-top:1px solid var(--border);
  background:rgba(10,10,15,0.5);
}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
}
@media (max-width:480px){
  :root{--card-aspect:1.3}
  .card-label{font-size:0.45rem;padding:1px 5px;top:5px;left:6px}
  .hint{font-size:0.7rem;padding:8px 12px 16px}
}
</style>
</head>
<body>
<header>
  <h1>⬡ 104 Animated Canvases</h1>
</header>

<div id="grid"></div>

<div class="hint">
  ✨ 104 unique procedural animations • 
  Fully responsive • 
  Optimized for mobile • 
  Scroll to explore all visuals
</div>

<footer>
  <p>🎨 Pure JavaScript animations • No dependencies • Works offline</p>
</footer>

<script>
(function(){
'use strict';

// ===== CONFIGURATION =====
const TOTAL_VISUALS = 104;
const CATEGORY_COUNT = 13;
const CATEGORY_NAMES = [
  'Ripples','Particles','Geometry','Waves','Cosmic','Bubble','Matrix',
  'Fractal','Plasma','Life','Fluid','Pulse','Nebula'
];
const CATEGORY_COLORS = [
  ['#4a9eff','#00d4aa','#7c5cfc','#ff6b9d','#ffd93d','#ff4757','#2ed573','#1e90ff','#ff6348'],
  ['#ff9ff3','#54a0ff','#5f27cd','#01a3a4','#f368e0','#ff6b6b','#48dbfb','#ff9f43','#00d2d3'],
  ['#e056fd','#22a6b3','#7ed6df','#e77f67','#cf6a87','#574b90','#f8a5c2','#63cdda','#778beb'],
  ['#82ccdd','#e4c1f5','#f5cd79','#546de5','#e15f41','#3c6382','#d63031','#a29bfe','#fd79a8'],
  ['#b8e994','#6a89cc','#e55039','#82ccdd','#78e08f','#e66767','#3867d6','#f7b731','#fc5c65'],
  ['#0f9d58','#1db954','#34c759','#20bf6b','#00b894','#27ae60','#2ecc71','#26de81','#6ab04c'],
  ['#00b894','#00cec9','#0984e3','#6c5ce7','#e84393','#fd79a8','#d63031','#f39c12','#2ecc71'],
  ['#a29bfe','#6c5ce7','#fd79a8','#e17055','#00b894','#00cec9','#0984e3','#fdcb6e','#e84393'],
  ['#2d3436','#636e72','#b2bec3','#dfe6e9','#74b9ff','#a29bfe','#fd79a8','#55efc4','#ffeaa7'],
  ['#0984e3','#6c5ce7','#d63031','#fdcb6e','#00b894','#e84393','#00cec9','#fab1a0','#74b9ff'],
  ['#6c5ce7','#00cec9','#e17055','#a29bfe','#55efc4','#fd79a8','#ffeaa7','#74b9ff','#dfe6e9'],
  ['#fd79a8','#e84393','#6c5ce7','#0984e3','#00b894','#fdcb6e','#e17055','#a29bfe','#00cec9'],
  ['#ff9e6d','#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#feca57','#ff9ff3','#54a0ff','#5f27cd']
];

// ===== DEVICE DETECTION & OPTIMIZATION =====
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
const isLowEnd = isMobile && (navigator.deviceMemory || 4) < 4;
const dpr = isLowEnd ? 1 : Math.min(window.devicePixelRatio || 1, 2);
const baseW = isMobile ? 140 : 200;
const baseH = Math.round(baseW / 1.4);
const particleLimit = isLowEnd ? 15 : 30;
const updateSkip = isLowEnd ? 2 : 1; // Skip frames for performance

// ===== DOM =====
const grid = document.getElementById('grid');

// ===== STATE =====
let time = 0, frame = 0;
let vol = 0.3, bass = 0.4, mid = 0.35, treble = 0.3, beat = 0, beatDecay = 0;
let fallbackT = 0;
const visuals = [];

// ===== UTILITIES =====
const lerp = (a,b,t)=>a+(b-a)*t;
const clamp = (v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const rand = (min,max)=>Math.random()*(max-min)+min;
const randInt = (min,max)=>Math.floor(rand(min,max+1));

// ===== CREATE VISUALS =====
function createVisuals(){
  for(let i=0;i<TOTAL_VISUALS;i++){
    const catIdx = i % CATEGORY_COUNT;
    const subIdx = Math.floor(i / CATEGORY_COUNT);
    
    const card = document.createElement('div');
    card.className = 'card';
    
    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = `${CATEGORY_NAMES[catIdx]} #${subIdx+1}`;
    
    const canvas = document.createElement('canvas');
    canvas.width = baseW * dpr;
    canvas.height = baseH * dpr;
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    
    card.appendChild(label);
    card.appendChild(canvas);
    grid.appendChild(card);
    
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.imageSmoothingEnabled = false;
    
    visuals.push({
      ctx, canvas, catIdx, subIdx,
      phase: i * 0.37,
      freq: 0.5 + i * 0.07,
      colors: CATEGORY_COLORS[catIdx],
      particles: [],
      lifeGrid: null,
      matrixCols: null,
      nebulaClouds: null,
      error: false
    });
  }
}

// ===== SIMULATED AUDIO (ORGANIC MODE) =====
function simulateAudio(){
  fallbackT += 0.024; // Faster animation
  vol = 0.35 + Math.sin(fallbackT * 0.9) * 0.25 + Math.sin(fallbackT * 1.7) * 0.15;
  bass = 0.45 + Math.sin(fallbackT * 0.6) * 0.3;
  mid = 0.4 + Math.sin(fallbackT * 1.1) * 0.25;
  treble = 0.35 + Math.sin(fallbackT * 1.6) * 0.2;
  beat = Math.sin(fallbackT * 3.5) > 0.88 ? 1 : 0;
  
  // Smooth values
  const s = 0.18;
  vol = lerp(vol, vol, s);
  bass = lerp(bass, bass, s);
  mid = lerp(mid, mid, s);
  treble = lerp(treble, treble, s);
  
  beatDecay = beatDecay * 0.92 + (beat > 0.5 ? 0.08 : 0);
  beatDecay = clamp(beatDecay, 0, 1);
}

// ===== RENDER DISPATCHER =====
function render(v){
  const {ctx,catIdx,subIdx,phase,freq,colors} = v;
  const w = baseW, h = baseH;
  
  // Fast clear with fade
  ctx.fillStyle = 'rgba(10,10,15,0.18)';
  ctx.fillRect(0,0,w,h);
  
  const t = time, p = phase, f = freq;
  const bv = vol, bb = bass, bm = mid, bt = treble, bbeat = beat, bdecay = beatDecay;
  
  try{
    switch(catIdx){
      case 0: drawRipples(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 1: drawParticles(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 2: drawGeometry(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 3: drawWaves(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 4: drawCosmic(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 5: drawBubble(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 6: drawMatrix(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 7: drawFractal(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 8: drawPlasma(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 9: drawLife(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 10: drawFluid(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
      case 11: drawPulse(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx);break;
      case 12: drawNebula(ctx,w,h,t,p,f,bv,bb,bm,bt,bbeat,bdecay,colors,subIdx,v);break;
    }
  }catch(e){
    if(!v.error){
      v.error = true;
      ctx.fillStyle = '#ff4444';
      ctx.font = '10px sans-serif';
      ctx.fillText('✕',8,12);
    }
  }
}

// ===== VISUALIZATION FUNCTIONS (OPTIMIZED) =====

function drawRipples(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const cx=w/2,cy=h/2,n=4+idx%4;
  for(let i=0;i<n;i++){
    const ph=i*Math.PI*2/n+p;
    const r=(12+i*18)*(0.6+v*0.7)+Math.sin(t*f+ph)*10*(1+b);
    ctx.beginPath();
    ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle=colors[i%colors.length];
    ctx.globalAlpha=clamp(0.75-i*0.15,0.08,0.75);
    ctx.lineWidth=1+tr*1.2;
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawParticles(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  const targetCount = 20 + idx * 2;
  if(vis.particles.length < targetCount && vis.particles.length < particleLimit){
    for(let i=vis.particles.length;i<targetCount && vis.particles.length<particleLimit;i++){
      vis.particles.push({
        x:rand(0,w),y:rand(0,h),
        vx:(rand(-1,1))*1.8,
        vy:(rand(-1,1))*1.8,
        sz:rand(1.2,2.8),
        c:randInt(0,colors.length-1)
      });
    }
  }
  
  // Update particles (skip frames on low-end)
  if(frame % updateSkip === 0){
    vis.particles.forEach(pt=>{
      pt.x+=pt.vx*(0.7+v*2)+Math.sin(t*f+pt.x*0.03)*0.5;
      pt.y+=pt.vy*(0.7+v*2)+Math.cos(t*f+pt.y*0.03)*0.5;
      if(pt.x<-5)pt.x=w+5;if(pt.x>w+5)pt.x=-5;
      if(pt.y<-5)pt.y=h+5;if(pt.y>h+5)pt.y=-5;
    });
  }
  
  // Draw connections (limited)
  if(!isLowEnd){
    ctx.globalAlpha=0.25+bd*0.4;
    for(let i=0;i<vis.particles.length;i+=2){
      const p1=vis.particles[i];
      for(let j=i+2;j<vis.particles.length;j+=2){
        const p2=vis.particles[j];
        const dx=p1.x-p2.x,dy=p1.y-p2.y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<45){
          ctx.beginPath();
          ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);
          ctx.strokeStyle=colors[(i+idx)%colors.length];
          ctx.lineWidth=0.3;
          ctx.stroke();
        }
      }
    }
  }
  
  // Draw particles
  ctx.globalAlpha=0.85;
  vis.particles.forEach((pt,i)=>{
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,pt.sz*(0.7+b*0.6),0,Math.PI*2);
    ctx.fillStyle=colors[pt.c];
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawGeometry(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const cx=w/2,cy=h/2,sides=3+idx%6,rot=t*f*0.7+p,sz=22+v*35+b*20;
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
  for(let i=0;i<3;i++){
    ctx.save();ctx.rotate(i*Math.PI*2/3);
    ctx.beginPath();
    for(let j=0;j<=sides;j++){
      const a=j*Math.PI*2/sides,r=sz+i*12+Math.sin(t*2+i)*4*(1+m);
      ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.strokeStyle=colors[(i+idx)%colors.length];
    ctx.lineWidth=1.2+tr*1;
    ctx.globalAlpha=0.9-i*0.25;
    ctx.stroke();
    ctx.restore();
  }
  ctx.restore();ctx.globalAlpha=1;
}

function drawWaves(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const n=3+idx%4;
  for(let i=0;i<n;i++){
    ctx.beginPath();
    const yBase=h*0.35+i*h*0.12;
    for(let x=0;x<=w;x+=4){
      const y=yBase+Math.sin(x*0.028*(1+b)+t*f*1.1+p+i)*20*(1+v)+Math.cos(x*0.045+t*f*0.9+i*2)*12*m;
      x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle=colors[i%colors.length];
    ctx.lineWidth=1.6+tr*1.3;
    ctx.globalAlpha=0.7-i*0.15;
    ctx.stroke();
  }
  ctx.globalAlpha=1;
}

function drawCosmic(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  if(!vis.nebulaClouds){
    vis.nebulaClouds=[];
    const count=30+idx*4;
    for(let i=0;i<count && i<particleLimit;i++){
      vis.nebulaClouds.push({
        x:rand(0,w),y:rand(0,h),
        sz:rand(0.8,2.2),spd:rand(0.03,0.08),
        ang:rand(0,Math.PI*2),pulse:rand(0,Math.PI*2)
      });
    }
  }
  
  if(frame%updateSkip===0){
    vis.nebulaClouds.forEach(st=>{
      st.ang+=st.spd*0.02*(1+b*0.4);
      st.x+=Math.cos(st.ang)*st.spd*(0.8+v);
      st.y+=Math.sin(st.ang)*st.spd*(0.8+v);
      if(st.x<-5)st.x=w+5;if(st.x>w+5)st.x=-5;
      if(st.y<-5)st.y=h+5;if(st.y>h+5)st.y=-5;
    });
  }
  
  vis.nebulaClouds.forEach((st,i)=>{
    const tw=0.6+Math.sin(t*f*3.5+st.pulse)*0.4;
    ctx.beginPath();
    ctx.arc(st.x,st.y,st.sz*(1+bd*0.4)*tw,0,Math.PI*2);
    ctx.fillStyle=colors[(i+idx)%colors.length];
    ctx.globalAlpha=tw*0.8;
    ctx.fill();
  });
  
  // Central glow
  ctx.globalAlpha=0.06+bd*0.1;
  ctx.beginPath();
  ctx.arc(w/2,h/2,30+v*30,0,Math.PI*2);
  ctx.fillStyle=colors[idx%colors.length];
  ctx.fill();
  ctx.globalAlpha=1;
}

function drawBubble(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  const target=50+idx*6;
  if(vis.particles.length<target && vis.particles.length<particleLimit*2){
    for(let i=vis.particles.length;i<target && vis.particles.length<particleLimit*2;i++){
      vis.particles.push({
        x:w/2+rand(-w*0.35,w*0.35),y:h+5,
        life:1,speed:rand(0.9,2.2),
        drift:rand(-0.8,0.8),sz:rand(1.5,3.5),
        c:randInt(0,colors.length-1)
      });
    }
  }
  
  ctx.globalCompositeOperation='lighter';
  
  if(frame%updateSkip===0){
    vis.particles.forEach(bub=>{
      bub.y-=bub.speed*(0.8+v*1.5);
      bub.x+=bub.drift+Math.sin(t*f+bub.y*0.05)*0.6;
      bub.life-=0.008*(1+b*0.3);
      if(bub.life<=0||bub.y<-5){
        bub.x=w/2+rand(-w*0.35,w*0.35);
        bub.y=h+5;bub.life=1;
        bub.speed=rand(0.9,2.2);
      }
    });
  }
  
  vis.particles.forEach(bub=>{
    ctx.beginPath();
    ctx.arc(bub.x,bub.y,bub.sz*bub.life,0,Math.PI*2);
    ctx.fillStyle=colors[bub.c];
    ctx.globalAlpha=bub.life*0.75;
    ctx.fill();
  });
  
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
}

function drawMatrix(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  const cs=10,cols=Math.floor(w/cs);
  if(!vis.matrixCols){
    vis.matrixCols=[];
    const chars='◆◇○●☆★△▲□■※☀☁☂☃♪♫♬☯☮✿❀❁❃❋';
    for(let i=0;i<cols;i++){
      vis.matrixCols.push({
        y:rand(0,h),spd:rand(1.3,3.2),
        chars:Array.from({length:randInt(6,14)},()=>chars[randInt(0,chars.length-1)])
      });
    }
  }
  
  ctx.fillStyle='rgba(10,10,15,0.08)';
  ctx.fillRect(0,0,w,h);
  ctx.font='9px monospace';
  ctx.textAlign='center';
  
  if(frame%updateSkip===0){
    vis.matrixCols.forEach(col=>{
      col.y+=col.spd*(0.7+v*2);
      if(col.y>h+15){col.y=-15;col.spd=rand(1.3,3.2);}
    });
  }
  
  vis.matrixCols.forEach((col,i)=>{
    col.chars.forEach((ch,j)=>{
      const cy=col.y-j*cs;
      if(cy<-cs||cy>h+cs)return;
      const isHead=j===0;
      ctx.fillStyle=isHead?'#fff':colors[(i+j+idx)%colors.length];
      ctx.globalAlpha=isHead?0.95:clamp(0.65-j*0.07,0.12,0.65)*(0.85+bd*0.15);
      ctx.fillText(ch,i*cs+cs/2,cy);
    });
  });
  ctx.globalAlpha=1;
}

function drawFractal(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const maxD=4+idx%3,len=28+v*30;
  function branch(x,y,a,l,d){
    if(d>maxD||l<2)return;
    const x2=x+Math.cos(a)*l,y2=y+Math.sin(a)*l;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x2,y2);
    ctx.strokeStyle=colors[(d+idx)%colors.length];
    ctx.globalAlpha=1-d/maxD*0.6;
    ctx.lineWidth=clamp(maxD-d+0.5,0.5,3)*(1+tr*0.3);
    ctx.stroke();
    const spr=0.38+b*0.22+Math.sin(t*2+d)*0.06;
    branch(x2,y2,a-spr,l*0.71*(1+m*0.12),d+1);
    branch(x2,y2,a+spr,l*0.71*(1+m*0.12),d+1);
  }
  branch(w/2,h-6,-Math.PI/2+Math.sin(t*0.5)*0.06,len,0);
  ctx.globalAlpha=1;
}

function drawPlasma(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const step=8+Math.floor(idx/4)*2;
  for(let x=0;x<w;x+=step){
    for(let y=0;y<h;y+=step){
      const val=(
        Math.sin(x*0.045+t*f*0.95+p)+
        Math.sin(y*0.045+t*f*0.75+p+1)+
        Math.sin((x+y)*0.035+t*f*1.35+p+2)+
        Math.sin(Math.sqrt(x*x+y*y)*0.028+t*f*0.55+p+3)
      )/4;
      ctx.fillStyle=colors[clamp(Math.floor((val+1)*colors.length/2),0,colors.length-1)];
      ctx.globalAlpha=0.28+val*0.32+v*0.22+bd*0.08;
      ctx.fillRect(x,y,step,step);
    }
  }
  ctx.globalAlpha=1;
}

function drawLife(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  const cs=6+idx%4,cols=Math.floor(w/cs),rows=Math.floor(h/cs);
  if(!vis.lifeGrid){
    vis.lifeGrid=[];
    for(let y=0;y<rows;y++){
      vis.lifeGrid[y]=[];
      for(let x=0;x<cols;x++)vis.lifeGrid[y][x]=rand(0,1)>0.74?1:0;
    }
  }
  
  const updInt=12-Math.floor(b*6);
  if(frame%clamp(updInt,4,14)===0&&frame%updateSkip===0){
    const next=[];
    for(let y=0;y<rows;y++){
      next[y]=[];
      for(let x=0;x<cols;x++){
        let n=0;
        for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
          if(!dx&&!dy)continue;
          n+=vis.lifeGrid[(y+dy+rows)%rows][(x+dx+cols)%cols];
        }
        next[y][x]=(vis.lifeGrid[y][x]&&(n===2||n===3))||(!vis.lifeGrid[y][x]&&n===3)?1:0;
      }
    }
    vis.lifeGrid=next;
  }
  
  vis.lifeGrid.forEach((row,y)=>{
    row.forEach((cell,x)=>{
      if(cell||v>0.38){
        ctx.fillStyle=colors[(x+y+idx+Math.floor(t*2.5))%colors.length];
        ctx.globalAlpha=cell?0.72:0.2+v*0.25;
        if(cell&&rand(0,1)<bd*0.2){ctx.fillStyle='#fff';ctx.globalAlpha=0.85;}
        ctx.fillRect(x*cs,y*cs,cs-1,cs-1);
      }
    });
  });
  ctx.globalAlpha=1;
}

function drawFluid(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  const streams=4+idx%5;
  for(let s=0;s<streams;s++){
    ctx.beginPath();
    let x=0,y=h*(0.18+s/streams);
    ctx.moveTo(x,y);
    for(let i=0;i<60;i++){
      const nx=x+3.5;
      const ny=y+Math.sin(nx*0.032+t*f+p+s)*15*(1+b)+Math.cos(nx*0.055+t*f*0.85+s*2)*9*m+Math.sin(nx*0.02+t*f*1.3+s)*6*tr;
      ctx.lineTo(nx,ny);x=nx;y=ny;
    }
    ctx.strokeStyle=colors[s%colors.length];
    ctx.lineWidth=1.4+tr*1.6+v*1.2;
    ctx.globalAlpha=0.5+bd*0.3;
    ctx.stroke();
  }
  
  // Floating dots
  for(let i=0;i<18+idx*2 && i<particleLimit;i++){
    ctx.beginPath();
    ctx.arc((i*21+Math.sin(t*f+i)*w*0.25)%w,(i*27+Math.cos(t*f*0.75+i)*h*0.35)%h,1.4+v*2,0,Math.PI*2);
    ctx.fillStyle=colors[i%colors.length];
    ctx.globalAlpha=0.6+Math.sin(t*2.5+i)*0.25;
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawPulse(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx){
  const cx=w/2,cy=h/2,rings=4+idx%5;
  for(let i=0;i<rings;i++){
    const ph=i*Math.PI*2/rings+p,pulse=Math.sin(t*f*2.4+ph)*0.5+0.5;
    ctx.beginPath();
    ctx.arc(cx,cy,16+pulse*50*(1+v)+i*13+bt*32,0,Math.PI*2);
    ctx.strokeStyle=colors[i%colors.length];
    ctx.lineWidth=1.6+tr*2.2+pulse*1.2;
    ctx.globalAlpha=0.38+pulse*0.42+bd*0.22;
    ctx.stroke();
  }
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,38+v*42);
  grd.addColorStop(0,colors[idx%colors.length]+'99');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;
  ctx.globalAlpha=0.45+bd*0.35;
  ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=1;
}

function drawNebula(ctx,w,h,t,p,f,v,b,m,tr,bt,bd,colors,idx,vis){
  if(!vis.nebulaClouds){
    vis.nebulaClouds=[];
    for(let i=0;i<3+idx%3;i++){
      const cloud={
        x:rand(0,w),y:rand(0,h),
        r:rand(25,55),spd:rand(0.004,0.009),
        col:colors[randInt(0,colors.length-1)],
        pts:[]
      };
      for(let j=0;j<25;j++){
        cloud.pts.push({
          ang:rand(0,Math.PI*2),dist:rand(0,1),
          sz:rand(0.4,1.8),spd:rand(0.012,0.028)
        });
      }
      vis.nebulaClouds.push(cloud);
    }
  }
  
  vis.nebulaClouds.forEach(cloud=>{
    cloud.x+=Math.sin(t*cloud.spd)*0.25;
    cloud.y+=Math.cos(t*cloud.spd*0.65)*0.25;
    
    cloud.pts.forEach(pt=>{
      pt.ang+=pt.spd*(1+b*0.4);
      const px=cloud.x+Math.cos(pt.ang)*cloud.r*pt.dist*(0.85+v*0.35);
      const py=cloud.y+Math.sin(pt.ang)*cloud.r*pt.dist*(0.85+v*0.35);
      const pulse=0.65+Math.sin(t*2.2+pt.ang*2.5)*0.35;
      const alpha=0.18+pulse*0.32*(1-pt.dist*0.65);
      
      ctx.beginPath();
      ctx.arc(px,py,pt.sz*(1+bd*0.4)*pulse,0,Math.PI*2);
      ctx.fillStyle=cloud.col;
      ctx.globalAlpha=alpha;
      ctx.fill();
    });
    
    // Cloud glow
    const grad=ctx.createRadialGradient(cloud.x,cloud.y,0,cloud.x,cloud.y,cloud.r*0.65);
    grad.addColorStop(0,cloud.col+'33');
    grad.addColorStop(0.75,cloud.col+'08');
    grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;
    ctx.globalAlpha=0.28+bd*0.18;
    ctx.beginPath();
    ctx.arc(cloud.x,cloud.y,cloud.r*0.75,0,Math.PI*2);
    ctx.fill();
  });
  
  // Foreground stars
  for(let i=0;i<25;i++){
    const sx=(i*43+t*18)%w,sy=(i*37)%h;
    const tw=0.5+Math.sin(t*4.5+i)*0.5;
    ctx.beginPath();
    ctx.arc(sx,sy,0.7+tw*0.6,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.globalAlpha=0.75+tw*0.25;
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ===== ANIMATION LOOP (OPTIMIZED) =====
function animate(){
  time += 0.028; // Faster base animation
  frame++;
  
  simulateAudio();
  
  // Render with performance consideration
  for(let i=0;i<visuals.length;i++){
    if(frame%updateSkip===0 || !isLowEnd){
      if(!visuals[i].error) render(visuals[i]);
    }
  }
  
  requestAnimationFrame(animate);
}

// ===== INIT =====
function init(){
  createVisuals();
  
  // Handle visibility for performance
  document.addEventListener('visibilitychange',()=>{
    // Could pause animations if needed, but keeping simple
  });
  
  // Start
  animate();
}

// Start when ready
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
})();
</script>
